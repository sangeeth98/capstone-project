<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisoner Monitoring - Capstone Portal</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="panel panel-wide">
        <h1>Prisoner Monitoring Logs</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">
            Search real-time locations and tracking data.
        </p>

        <form id="searchForm" onsubmit="return false;" style="max-width: 500px; margin: 0 auto;">
            <div class="form-group">
                <label class="form-label" for="Pid">Prisoner ID</label>
                <input type="text" id="Pid" class="form-input" placeholder="e.g. John" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="Pdate">Date (Optional)</label>
                <input type="text" id="Pdate" class="form-input" placeholder="YYYY-MM-DD">
            </div>

            <button type="submit" id="searchBtn" class="btn">
                <span>Search Tracking Logs</span>
            </button>
        </form>

        <!-- Dynamic Results Container -->
        <div id="resultsArea" style="margin-top: 30px;"></div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="connectiontofirebase.html" class="nav-link">← Back to Dashboard</a>
        </div>
    </div>

    <!-- Firebase v10 Modular Integration -->
    <script type="module">
        import { db } from "./firebase-config.js";
        import { ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { showToast } from "./utils.js";

        document.getElementById("searchBtn").addEventListener("click", searchMonitoringData);

        async function searchMonitoringData() {
            const resultsArea = document.getElementById("resultsArea");
            resultsArea.innerHTML = ""; // Clear existing tables

            const pid = document.getElementById("Pid").value.trim();
            const pdate = document.getElementById("Pdate").value.trim();

            if (!pid) {
                showToast("Please enter a Prisoner ID.", "error");
                return;
            }

            const searchBtn = document.getElementById("searchBtn");
            const originalText = searchBtn.innerHTML;
            searchBtn.disabled = true;
            searchBtn.innerHTML = `<span class="spinner"></span> <span>Searching...</span>`;

            try {
                // Check if prisoner exists in Monitoring logs
                const monitoringRef = ref(db, `Monitoring`);
                const snapshot = await get(monitoringRef);

                if (!snapshot.exists()) {
                    showToast("No monitoring database found.", "error");
                    return;
                }

                const monitoringData = snapshot.val();
                if (!monitoringData.hasOwnProperty(pid)) {
                    showToast("Wrong Prisoner ID.", "error");
                    return;
                }

                // If specific date is entered
                if (pdate.length > 0) {
                    // Quick date regex check YYYY-MM-DD
                    const datePattern = /^\d{4}-\d{2}-\d{2}$/;
                    if (!datePattern.test(pdate)) {
                        showToast("Wrong Date Format. Please use YYYY-MM-DD.", "error");
                        return;
                    }

                    const specificDayRef = ref(db, `Monitoring/${pid}/${pdate}`);
                    const dateSnapshot = await get(specificDayRef);

                    if (!dateSnapshot.exists()) {
                        showToast("No logs found for this date.", "info");
                        return;
                    }

                    createTable(pdate, dateSnapshot.val());
                } else {
                    // Fetch all logs for the prisoner
                    const allDataRef = ref(db, `Monitoring/${pid}`);
                    const allSnapshot = await get(allDataRef);
                    const currValues = allSnapshot.val();

                    if (!currValues) {
                        showToast("No tracking logs found.", "info");
                        return;
                    }

                    const keys = Object.keys(currValues);
                    for (let i = 0; i < keys.length; i++) {
                        const key = keys[i];
                        const val = currValues[key];
                        // If it's a date folder containing time:location dictionary
                        if (typeof val === 'object' && val !== null) {
                            createTable(key, val);
                        } else {
                            // Flat log structure
                            createTable("General Logs", { [key]: val });
                        }
                    }
                }
            } catch (error) {
                console.error("Database fetch error: ", error);
                showToast("Database Error.", "error");
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = originalText;
            }
        }

        function createTable(title, dataVal) {
            const resultsArea = document.getElementById("resultsArea");

            const tableContainer = document.createElement("div");
            tableContainer.className = "table-container";
            tableContainer.style.marginBottom = "24px";

            const table = document.createElement("table");
            table.className = "datatable";

            const caption = table.createCaption();
            caption.innerHTML = `<b>Date: ${title}</b>`;

            // Table Header
            const thead = document.createElement("thead");
            const headingRow = document.createElement("tr");
            
            const th1 = document.createElement("th");
            th1.textContent = "Time";
            headingRow.appendChild(th1);

            const th2 = document.createElement("th");
            th2.textContent = "Location / Status";
            headingRow.appendChild(th2);

            thead.appendChild(headingRow);
            table.appendChild(thead);

            // Table Body
            const tbody = document.createElement("tbody");
            const keys = Object.keys(dataVal);

            for (let i = 0; i < keys.length; i++) {
                const timeKey = keys[i];
                const locVal = dataVal[timeKey];

                const row = document.createElement("tr");

                const tdTime = document.createElement("td");
                tdTime.textContent = timeKey;
                row.appendChild(tdTime);

                const tdLoc = document.createElement("td");
                tdLoc.textContent = locVal;
                row.appendChild(tdLoc);

                tbody.appendChild(row);
            }

            table.appendChild(tbody);
            tableContainer.appendChild(table);
            resultsArea.appendChild(tableContainer);
        }
    </script>
</body>
</html>
