<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Occupancy Logs - Capstone Portal</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="panel panel-wide">
        <h1>Room Occupancy Logs</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">
            Search real-time occupancy status and logs by Room ID and date.
        </p>

        <form id="searchForm" onsubmit="return false;" style="max-width: 500px; margin: 0 auto;">
            <div class="form-group">
                <label class="form-label" for="Rid">Room ID</label>
                <input type="text" id="Rid" class="form-input" placeholder="e.g. Room101" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="Rdate">Date (Optional)</label>
                <input type="text" id="Rdate" class="form-input" placeholder="MM:DD:YYYY or YYYY-MM-DD">
            </div>

            <button type="submit" id="searchBtn" class="btn">
                <span>Search Occupancy Logs</span>
            </button>
        </form>

        <!-- Dynamic Results Container -->
        <div id="resultsArea" style="margin-top: 30px;"></div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="connectiontofirebase.html" class="nav-link">← Back to Dashboard</a>
        </div>
    </div>

    <!-- Firebase v10 Modular Integration -->
    <script type="module">
        import { db } from "./firebase-config.js";
        import { ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { showToast } from "./utils.js";

        document.getElementById("searchBtn").addEventListener("click", searchOccupiedData);

        async function searchOccupiedData() {
            const resultsArea = document.getElementById("resultsArea");
            resultsArea.innerHTML = ""; // Clear existing tables

            const rid = document.getElementById("Rid").value.trim();
            const rdate = document.getElementById("Rdate").value.trim();

            if (!rid) {
                showToast("Please enter a Room ID.", "error");
                return;
            }

            const searchBtn = document.getElementById("searchBtn");
            const originalText = searchBtn.innerHTML;
            searchBtn.disabled = true;
            searchBtn.innerHTML = `<span class="spinner"></span> <span>Searching...</span>`;

            try {
                // Fetch Room Occupied path
                const occupiedRef = ref(db, `Room Occupied`);
                const snapshot = await get(occupiedRef);

                if (!snapshot.exists()) {
                    showToast("No occupancy database found.", "error");
                    return;
                }

                const occupiedData = snapshot.val();
                if (!occupiedData.hasOwnProperty(rid)) {
                    showToast("Wrong Room ID.", "error");
                    return;
                }

                // If specific date is entered
                if (rdate.length > 0) {
                    const specificDayRef = ref(db, `Room Occupied/${rid}/${rdate}`);
                    const dateSnapshot = await get(specificDayRef);

                    if (!dateSnapshot.exists()) {
                        showToast("No logs found for this date.", "info");
                        return;
                    }

                    createTable(rdate, dateSnapshot.val());
                } else {
                    // Fetch all logs for this Room
                    const allDataRef = ref(db, `Room Occupied/${rid}`);
                    const allSnapshot = await get(allDataRef);
                    const currValues = allSnapshot.val();

                    if (!currValues) {
                        showToast("No occupancy logs found.", "info");
                        return;
                    }

                    const keys = Object.keys(currValues);
                    for (let i = 0; i < keys.length; i++) {
                        const key = keys[i];
                        const val = currValues[key];
                        // Skip flag attributes like 'Occupied' or 'Unoccupied'
                        if (key === "Occupied" || key === "Unoccupied") {
                            continue;
                        }
                        
                        if (typeof val === 'object' && val !== null) {
                            createTable(key, val);
                        } else {
                            createTable("General Logs", { [key]: val });
                        }
                    }
                }
            } catch (error) {
                console.error("Database fetch error: ", error);
                showToast("Database Error.", "error");
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = originalText;
            }
        }

        function createTable(title, dataVal) {
            const resultsArea = document.getElementById("resultsArea");

            const tableContainer = document.createElement("div");
            tableContainer.className = "table-container";
            tableContainer.style.marginBottom = "24px";

            const table = document.createElement("table");
            table.className = "datatable";

            const caption = table.createCaption();
            caption.innerHTML = `<b>Date: ${title}</b>`;

            // Table Header
            const thead = document.createElement("thead");
            const headingRow = document.createElement("tr");
            
            const th1 = document.createElement("th");
            th1.textContent = "Time";
            headingRow.appendChild(th1);

            const th2 = document.createElement("th");
            th2.textContent = "Location / Status";
            headingRow.appendChild(th2);

            thead.appendChild(headingRow);
            table.appendChild(thead);

            // Table Body
            const tbody = document.createElement("tbody");
            const keys = Object.keys(dataVal);

            for (let i = 0; i < keys.length; i++) {
                const timeKey = keys[i];
                const locVal = dataVal[timeKey];

                // Skip layout keys if they slip inside child nodes
                if (timeKey === "Occupied" || timeKey === "Unoccupied") {
                    continue;
                }

                const row = document.createElement("tr");

                const tdTime = document.createElement("td");
                tdTime.textContent = timeKey;
                row.appendChild(tdTime);

                const tdLoc = document.createElement("td");
                tdLoc.textContent = locVal;
                row.appendChild(tdLoc);

                tbody.appendChild(row);
            }

            table.appendChild(tbody);
            tableContainer.appendChild(table);
            resultsArea.appendChild(tableContainer);
        }
    </script>
</body>
</html>
